# Render Blueprint — deploy the FastAPI backend as a Web Service.
# https://render.com/docs/infrastructure-as-code
#
# After push: Render Dashboard → New → Blueprint → connect this repo → apply.
# Set secret env vars in the dashboard (ANTHROPIC_API_KEY, etc.) when prompted.

services:
  - type: web
    name: civicsync-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: VOYAGEAI_API_KEY
        sync: false
